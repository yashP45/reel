<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reel Webcam</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 160px;
        height: 160px;
        overflow: hidden;
        background: #111;
        border-radius: 50%;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }
    </style>
  </head>
  <body>
    <video id="cam" autoplay muted playsinline></video>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
